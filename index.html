<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web AR - Fruit Catcher Game</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/wasm/vision_bundle.js" crossorigin="anonymous"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #webcam {
            display: none;
        }

        #canvas-output {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* ส่องกระจก */
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
            z-index: 10;
        }

        #header-info {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .score-box {
            font-size: 32px;
            font-weight: bold;
            color: #333;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 25px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        #timer {
            color: #ff3333;
        }

        #game-status {
            font-size: 32px;
            color: #fff;
            background: rgba(0, 0, 0, 0.85);
            padding: 20px 40px;
            border-radius: 15px;
            text-align: center;
            display: none;
            line-height: 1.6;
        }

        .btn {
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            pointer-events: auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            transition: 0.2s;
            margin-bottom: 50px;
        }

        .btn:hover {
            background-color: #45a049;
            transform: scale(1.05);
        }

        #loading-text {
            color: white;
            font-size: 24px;
            position: absolute;
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="loading-text">กำลังโหลดรูปภาพและ AI...</div>
        
        <video id="webcam" autoplay playsinline></video>
        <canvas id="canvas-output"></canvas>

        <div id="ui-layer">
            <div id="header-info">
                <div id="timer" class="score-box">เวลา: 60</div>
                <div id="score" class="score-box">คะแนน: 0</div>
            </div>
            
            <div id="game-status">หมดเวลา!</div>
            <button id="start-btn" class="btn" style="display: none;">เริ่มเกมเก็บผลไม้</button>
        </div>
    </div>

    <script type="module">
        import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/wasm/vision_bundle.js";

        const video = document.getElementById("webcam");
        const canvasElement = document.getElementById("canvas-output");
        const canvasCtx = canvasElement.getContext("2d");
        const startBtn = document.getElementById("start-btn");
        const timerTxt = document.getElementById("timer");
        const scoreTxt = document.getElementById("score");
        const statusTxt = document.getElementById("game-status");
        const loadingTxt = document.getElementById("loading-text");

        let handLandmarker = undefined;
        let webcamRunning = false;
        let lastVideoTime = -1;
        
        // สถานะเกม (รอบละ 60 วินาที)
        let isPlaying = false;
        let timeLeft = 60; 
        let score = 0;
        let timerInterval;

        // ตัวแปรตะกร้า
        let basketX = 0;
        let basketY = 0;
        const basketWidth = 150;
        const basketHeight = 100;

        // ตัวแปรไอเทมตกลงมา
        let currentItem = null; 
        const itemSize = 80;

        // =============================================================
        // 🖼️ เปลี่ยนลิงก์รูปเป็นแหล่งข้อมูลสาธารณะ ไม่ติดระบบ CORS (แก้ค้างชัวร์!)
        // =============================================================
        const imgBasket = new Image();
        imgBasket.crossOrigin = "anonymous";
        imgBasket.src = 'https://images.vexels.com/media/users/3/235777/isolated/preview/26e4e094c77174db37b278f99e4693b4-picnic-basket-flat.png';

        const imgApple = new Image();
        imgApple.crossOrigin = "anonymous";
        imgApple.src = 'https://images.vexels.com/media/users/3/147113/isolated/preview/265df07d9b9c9f0bc7d72af5b78e47f7-red-apple-fruit-icon.png';

        const imgBanana = new Image();
        imgBanana.crossOrigin = "anonymous";
        imgBanana.src = 'https://images.vexels.com/media/users/3/147117/isolated/preview/30e3863486c05f778f6ef21f5be634df-banana-fruit-icon.png';

        const imgRock = new Image();
        imgRock.crossOrigin = "anonymous";
        imgRock.src = 'https://images.vexels.com/media/users/3/145827/isolated/preview/3fa41f80f339cf0766cd64ff1b47ee37-stone-rock-cartoon.png';

        const imgBomb = new Image();
        imgBomb.crossOrigin = "anonymous";
        imgBomb.src = 'https://images.vexels.com/media/users/3/153920/isolated/preview/1a9db1548e244837ef585b91b8a53696-bomb-cartoon-icon.png';

        const imgBackground = new Image();
        imgBackground.crossOrigin = "anonymous";
        imgBackground.src = 'https://images.unsplash.com/photo-1500382017468-9049fed747ef?fm=jpg&q=60&w=1000';
        // =============================================================

        let loadedImagesCount = 0;
        const totalImages = 6;

        function imageLoaded() {
            loadedImagesCount++;
            if (loadedImagesCount === totalImages) {
                initializeHandLandmarker(); 
            }
        }

        // หากรูปใดรูปหนึ่งโหลดไม่สำเร็จ ให้ข้ามเพื่อไม่ให้เกมค้าง
        function imageError() {
            console.log("Image load fail, skipping to prevent freeze...");
            imageLoaded();
        }

        imgBasket.onload = imageLoaded; imgBasket.onerror = imageError;
        imgApple.onload = imageLoaded; imgApple.onerror = imageError;
        imgBanana.onload = imageLoaded; imgBanana.onerror = imageError;
        imgRock.onload = imageLoaded; imgRock.onerror = imageError;
        imgBomb.onload = imageLoaded; imgBomb.onerror = imageError;
        imgBackground.onload = imageLoaded; imgBackground.onerror = imageError;

        // รายการของตกและระบบสุ่ม
        const itemPool = [
            { name: "apple", img: imgApple, isFruit: true, speed: 7 },
            { name: "banana", img: imgBanana, isFruit: true, speed: 6 },
            { name: "rock", img: imgRock, isFruit: false, speed: 8 },
            { name: "bomb", img: imgBomb, isFruit: false, speed: 9 }
        ];

        function spawnNewItem() {
            const randomTemplate = itemPool[Math.floor(Math.random() * itemPool.length)];
            
            currentItem = {
                img: randomTemplate.img,
                isFruit: randomTemplate.isFruit,
                speed: randomTemplate.speed + (Math.random() * 3), 
                x: Math.random() * (canvasElement.width - 200) + 100,
                y: -50
            };
        }

        // 🤖 เริ่มทำงาน MediaPipe Hands
        async function initializeHandLandmarker() {
            try {
                const vision = await FilesetResolver.forVisionTasks(
                    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/wasm"
                );
                handLandmarker = await HandLandmarker.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task`,
                        delegate: "GPU"
                    },
                    runningMode: "VIDEO",
                    numHands: 1
                });
                
                loadingTxt.style.display = "none";
                startBtn.style.display = "block";
            } catch (error) {
                loadingTxt.innerText = "เกิดข้อผิดพลาดในการโหลด AI แขน/มือ";
                console.error(error);
            }
        }

        startBtn.addEventListener("click", () => {
            if (!handLandmarker) return;
            startBtn.style.display = "none";
            statusTxt.style.display = "none";
            
            if (!webcamRunning) {
                webcamRunning = true;
                navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 } }).then((stream) => {
                    video.srcObject = stream;
                    video.addEventListener("loadeddata", () => {
                        canvasElement.width = video.videoWidth;
                        canvasElement.height = video.videoHeight;
                        
                        basketY = canvasElement.height - 120; 
                        spawnNewItem();
                        
                        startGame();
                        predictWebcam();
                    });
                }).catch(err => {
                    alert("กรุณาอนุญาตให้ใช้งานกล้องถ่ายรูปเพื่อเล่นเกม");
                });
            } else {
                spawnNewItem();
                startGame();
            }
        });

        function startGame() {
            isPlaying = true;
            timeLeft = 60; 
            score = 0;
            scoreTxt.innerText = "คะแนน: " + score;
            timerTxt.innerText = "เวลา: " + timeLeft;
            
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                timerTxt.innerText = "เวลา: " + timeLeft;
                
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            isPlaying = false;
            clearInterval(timerInterval);
            statusTxt.style.display = "block";
            startBtn.style.display = "block";
            startBtn.innerText = "เล่นอีกครั้ง";
            statusTxt.innerText = `จบเกม! คุณได้คะแนนทั้งหมด ${score} คะแนน 🌟`;
        }

        async function predictWebcam() {
            if (!webcamRunning) return;

            let startTimeMs = performance.now();
            if (lastVideoTime !== video.currentTime) {
                lastVideoTime = video.currentTime;
                
                const detections = handLandmarker.detectForVideo(video, startTimeMs);
                
                canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
                
                // 1. วาดรูปกล้องเว็บแคม
                canvasCtx.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);

                // 2. วาดภาพพื้นหลัง (โปร่งแสง 40%)
                if (imgBackground.complete) {
                    canvasCtx.save();
                    canvasCtx.globalAlpha = 0.4; 
                    canvasCtx.drawImage(imgBackground, 0, 0, canvasElement.width, canvasElement.height);
                    canvasCtx.restore();
                }

                if (detections.landmarks && detections.landmarks.length > 0) {
                    const landmarks = detections.landmarks[0];
                    const wrist = landmarks[0];
                    basketX = (1 - wrist.x) * canvasElement.width; 
                }

                if (isPlaying && currentItem) {
                    currentItem.y += currentItem.speed; 

                    if (currentItem.y >= basketY - 30 && currentItem.y <= basketY + 30) {
                        if (Math.abs(currentItem.x - basketX) < basketWidth / 2) {
                            if (currentItem.isFruit) {
                                score += 1;
                            } else {
                                score = Math.max(0, score - 1);
                            }
                            scoreTxt.innerText = "คะแนน: " + score;
                            spawnNewItem(); 
                        }
                    }

                    if (currentItem.y > canvasElement.height) {
                        spawnNewItem(); 
                    }
                }

                drawGameScene();
            }

            window.requestAnimationFrame(predictWebcam);
        }

        function drawGameScene() {
            canvasCtx.save();
            
            if (isPlaying && currentItem && currentItem.img.complete) {
                canvasCtx.drawImage(
                    currentItem.img, 
                    currentItem.x - (itemSize / 2), 
                    currentItem.y - (itemSize / 2), 
                    itemSize, 
                    itemSize
                );
            }

            if (imgBasket.complete) {
                canvasCtx.drawImage(
                    imgBasket, 
                    basketX - (basketWidth / 2), 
                    basketY - (basketHeight / 2), 
                    basketWidth, 
                    basketHeight
                );
            }
            
            canvasCtx.restore();
        }
    </script>
</body>
</html>
