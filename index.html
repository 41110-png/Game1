<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beary Clean! เกมทำความสะอาดน้องหมี</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        /* สไตล์พื้นฐาน: ฟอนต์และเลย์เอาต์ */
        @import url('https://fonts.googleapis.com/css2?family=Mali:wght@400;700&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Mali', cursive; /* ฟอนต์น่ารักๆ เข้ากับธีมเกม */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            transition: background 1s ease; /* แอนิเมชันตอนเปลี่ยนสีพื้นหลัง */
        }

        /* 🌟 โทนสีสดใส (เล่นปกติ / สำเร็จ) - ฟ้าชมพูพาสเทลมินิมอล */
        .theme-happy {
            background: linear-gradient(135deg, #FFD1DC 0%, #BFE6FF 100%);
            color: #555;
        }

        /* 🌧️ โทนสีอึมครึม (ทำผิด) - หม่นหมอง ใจเจ็บ */
        .theme-gloomy {
            background: linear-gradient(135deg, #5C6B73 0%, #253237 100%);
            color: #E0E0E0;
        }

        h1 {
            margin: 10px 0;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        /* คอนเทนเนอร์แสดงกล้องและเกม */
        #game-container {
            position: relative;
            width: 640px;
            height: 480px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            background-color: white; /* กันเหนียวเผื่อกล้องยังไม่โหลด */
        }

        /* ซ่อนวิดีโอต้นฉบับ เอาไว้ใช้ประมวลผลเฉยๆ */
        .input_video {
            display: none;
        }

        /* แคนวาสสำหรับวาดภาพทับลงไป */
        .output_canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: scaleX(-1); /* สลับซ้ายขวาให้เป็นเหมือนกระจกเงา */
        }

        /* ป้ายสถานะ (UI) */
        #status-board {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 30px;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.9);
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.5s ease;
        }

        /* ปุ่มเริ่มเล่นใหม่ (ซ่อนไว้ก่อน) */
        #restart-btn {
            display: none;
            margin-top: 20px;
            padding: 10px 30px;
            font-size: 18px;
            font-family: inherit;
            border: none;
            border-radius: 30px;
            background-color: #FFB6C1;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        #restart-btn:hover { background-color: #FF69B4; color: white; }
    </style>
</head>
<body class="theme-happy" id="body">

    <h1>🧸 ภารกิจทำความสะอาดน้องหมี</h1>
    
    <div id="game-container">
        <video class="input_video"></video>
        <canvas class="output_canvas" width="640" height="480"></canvas>
        <div id="status-board">เอามือถูที่รอยเปื้อนเลย!</div>
    </div>

    <button id="restart-btn" onclick="resetGame()">ลองใหม่ซิ!</button>

    <script>
        // --- 1. ตั้งค่าตัวแปรอ้างอิง UI ---
        const videoElement = document.querySelector('.input_video');
        const canvasElement = document.querySelector('.output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const statusBoard = document.getElementById('status-board');
        const bodyTheme = document.getElementById('body');
        const restartBtn = document.getElementById('restart-btn');

        // --- 2. ตัวแปรสถานะของเกม ---
        let gameState = "PLAYING"; // 'PLAYING', 'SUCCESS', 'FAIL'
        
        // ตำแหน่งน้องหมี (กลางจอ)
        const bearX = 320;
        const bearY = 240;
        
        // ตำแหน่งรอยเปื้อน (เป้าหมายที่ต้องเช็ด)
        const dirtX = 300;
        const dirtY = 280;
        const dirtRadius = 30;
        
        // ตำแหน่งตา (จุดต้องห้าม! ถ้าเอามือจิ้มตา = โกรธ/Fail)
        const eyeRadius = 25;

        // --- 3. ฟังก์ชันวาดน้องหมี (เปลี่ยนหน้าตามสถานะ) ---
        function drawBear(ctx, state) {
            ctx.save();
            // ถ้าหน้าจอกลับด้าน (Mirror) พิกัดอาจจะต้องวาดปกติ เพราะเราทำ scaleX(-1) ที่ CSS แล้ว
            
            // วาดหัวหมี (สีน้ำตาลครีม)
            ctx.beginPath();
            ctx.arc(bearX, bearY, 100, 0, 2 * Math.PI);
            ctx.fillStyle = (state === 'FAIL') ? '#A67B5B' : '#E6B999'; // สีหม่นลงถ้าแพ้
            ctx.fill();

            // วาดหู
            ctx.beginPath(); ctx.arc(bearX - 80, bearY - 80, 35, 0, 2 * Math.PI); ctx.fill();
            ctx.beginPath(); ctx.arc(bearX + 80, bearY - 80, 35, 0, 2 * Math.PI); ctx.fill();

            // วาดใบหน้า (ตาและปาก)
            ctx.fillStyle = '#333';
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 4;

            if (state === 'PLAYING') {
                // หน้าปกติ: ตาแป๋ว
                ctx.beginPath(); ctx.arc(bearX - 35, bearY - 10, 8, 0, 2*Math.PI); ctx.fill();
                ctx.beginPath(); ctx.arc(bearX + 35, bearY - 10, 8, 0, 2*Math.PI); ctx.fill();
                // ปาก (เส้นตรงๆ อึนๆ)
                ctx.beginPath(); ctx.moveTo(bearX - 10, bearY + 25); ctx.lineTo(bearX + 10, bearY + 25); ctx.stroke();
                
                // วาดรอยเปื้อน
                ctx.beginPath(); ctx.arc(dirtX, dirtY, dirtRadius, 0, 2 * Math.PI);
                ctx.fillStyle = 'rgba(101, 67, 33, 0.7)'; // สีโคลน
                ctx.fill();

            } else if (state === 'SUCCESS') {
                // หน้าสำเร็จ: ยิ้มตาหยี แฮปปี้
                ctx.beginPath(); ctx.arc(bearX - 35, bearY - 10, 10, Math.PI, 0); ctx.stroke(); // ตาซ้ายหยี
                ctx.beginPath(); ctx.arc(bearX + 35, bearY - 10, 10, Math.PI, 0); ctx.stroke(); // ตาขวาหยี
                // ปากยิ้มกว้าง
                ctx.beginPath(); ctx.arc(bearX, bearY + 20, 20, 0, Math.PI); ctx.fill();
                
                // แก้มแดง
                ctx.fillStyle = 'rgba(255, 105, 180, 0.5)';
                ctx.beginPath(); ctx.arc(bearX - 50, bearY + 10, 15, 0, 2*Math.PI); ctx.fill();
                ctx.beginPath(); ctx.arc(bearX + 50, bearY + 10, 15, 0, 2*Math.PI); ctx.fill();

            } else if (state === 'FAIL') {
                // หน้าบึ้ง: คิ้วขมวด ตาจุด ปากคว่ำ
                // คิ้ว
                ctx.beginPath(); ctx.moveTo(bearX - 50, bearY - 25); ctx.lineTo(bearX - 25, bearY - 15); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(bearX + 50, bearY - 25); ctx.lineTo(bearX + 25, bearY - 15); ctx.stroke();
                // ตา
                ctx.beginPath(); ctx.arc(bearX - 35, bearY - 5, 6, 0, 2*Math.PI); ctx.fill();
                ctx.beginPath(); ctx.arc(bearX + 35, bearY - 5, 6, 0, 2*Math.PI); ctx.fill();
                // ปากเบ้
                ctx.beginPath(); ctx.arc(bearX, bearY + 40, 15, Math.PI, 0); ctx.stroke();
            }
            
            ctx.restore();
        }

        // --- 4. ฟังก์ชันหลักเวลากล้องตรวจจับมือได้ ---
        function onResults(results) {
            // ล้างหน้าจอ
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            // วาดวิดีโอจากกล้องเป็นพื้นหลัง
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            // วาดตัวตุ๊กตาหมี
            drawBear(canvasCtx, gameState);

            // วาดมือถ้าตรวจจับเจอ
            if (results.multiHandLandmarks && gameState === 'PLAYING') {
                for (const landmarks of results.multiHandLandmarks) {
                    
                    // จุดที่ 8 คือ ปลายนิ้วชี้ (Index Finger Tip)
                    const indexFinger = landmarks[8];
                    
                    // แปลงพิกัดจาก Normalize (0-1) เป็นพิกัดจริงบน Canvas
                    // หมายเหตุ: ต้องกลับด้าน X เพราะ CSS เราพลิกกระจก
                    const fingerX = (1 - indexFinger.x) * canvasElement.width; 
                    const fingerY = indexFinger.y * canvasElement.height;

                    // วาดจุดสีฟ้าน่ารักๆ ที่ปลายนิ้วชี้
                    canvasCtx.beginPath();
                    canvasCtx.arc(fingerX, fingerY, 15, 0, 2 * Math.PI);
                    canvasCtx.fillStyle = 'rgba(135, 206, 250, 0.8)';
                    canvasCtx.fill();

                    // --- ตรวจสอบเงื่อนไขเกมเพลย์ ---
                    
                    // 1. เช็คว่าปลายนิ้วโดนรอยเปื้อนหรือไม่ (คำนวณระยะห่าง)
                    const distToDirt = Math.hypot(fingerX - dirtX, fingerY - dirtY);
                    
                    // 2. เช็คว่าปลายนิ้วพลาดไปจิ้มตาหมีหรือไม่ (จุดต้องห้าม)
                    const distToLeftEye = Math.hypot(fingerX - (bearX - 35), fingerY - (bearY - 10));
                    const distTo
