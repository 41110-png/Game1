<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web AR - Fruit Catcher Game</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #webcam {
            display: none;
        }

        #canvas-output {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* ส่องกระจก */
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
            z-index: 10;
        }

        #header-info {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .score-box {
            font-size: 32px;
            font-weight: bold;
            color: #333;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 25px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        #timer {
            color: #ff3333;
        }

        #game-status {
            font-size: 32px;
            color: #fff;
            background: rgba(0, 0, 0, 0.85);
            padding: 20px 40px;
            border-radius: 15px;
            text-align: center;
            display: none;
            line-height: 1.6;
        }

        .btn {
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            pointer-events: auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            transition: 0.2s;
            margin-bottom: 50px;
        }

        .btn:hover {
            background-color: #45a049;
            transform: scale(1.05);
        }

        #loading-text {
            color: white;
            font-size: 24px;
            position: absolute;
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="loading-text">กำลังตั้งค่าระบบ AR และเปิดกล้อง...</div>
        
        <video id="webcam" autoplay playsinline></video>
        <canvas id="canvas-output"></canvas>

        <div id="ui-layer">
            <div id="header-info">
                <div id="timer" class="score-box">เวลา: 60</div>
                <div id="score" class="score-box">คะแนน: 0</div>
            </div>
            
            <div id="game-status">หมดเวลา!</div>
            <button id="start-btn" class="btn" style="display: none;">เริ่มเกมเก็บผลไม้</button>
        </div>
    </div>

    <script>
        const video = document.getElementById("webcam");
        const canvasElement = document.getElementById("canvas-output");
        const canvasCtx = canvasElement.getContext("2d");
        const startBtn = document.getElementById("start-btn");
        const timerTxt = document.getElementById("timer");
        const scoreTxt = document.getElementById("score");
        const statusTxt = document.getElementById("game-status");
        const loadingTxt = document.getElementById("loading-text");

        let isPlaying = false;
        let timeLeft = 60; 
        let score = 0;
        let timerInterval;

        let basketX = 0;
        let basketY = 0;
        const basketWidth = 150;
        const basketHeight = 100;

        let currentItem = null; 
        const itemSize = 80;

        // 🖼️ รูปภาพเกมที่ใช้ระบบบายพาส CORS
        const imgBasket = new Image();
        imgBasket.crossOrigin = "anonymous";
        imgBasket.src = 'https://images.vexels.com/media/users/3/235777/isolated/preview/26e4e094c77174db37b278f99e4693b4-picnic-basket-flat.png';

        const imgApple = new Image();
        imgApple.crossOrigin = "anonymous";
        imgApple.src = 'https://images.vexels.com/media/users/3/147113/isolated/preview/265df07d9b9c9f0bc7d72af5b78e47f7-red-apple-fruit-icon.png';

        const imgBanana = new Image();
        imgBanana.crossOrigin = "anonymous";
        imgBanana.src = 'https://images.vexels.com/media/users/3/147117/isolated/preview/30e3863486c05f778f6ef21f5be634df-banana-fruit-icon.png';

        const imgRock = new Image();
        imgRock.crossOrigin = "anonymous";
        imgRock.src = 'https://images.vexels.com/media/users/3/145827/isolated/preview/3fa41f80f339cf0766cd64ff1b47ee37-stone-rock-cartoon.png';

        const imgBomb = new Image();
        imgBomb.crossOrigin = "anonymous";
        imgBomb.src = 'https://images.vexels.com/media/users/3/153920/isolated/preview/1a9db1548e244837ef585b91b8a53696-bomb-cartoon-icon.png';

        const imgBackground = new Image();
        imgBackground.crossOrigin = "anonymous";
        imgBackground.src = 'https://images.unsplash.com/photo-1500382017468-9049fed747ef?fm=jpg&q=60&w=1000';

        const itemPool = [
            { name: "apple", img: imgApple, isFruit: true, speed: 6 },
            { name: "banana", img: imgBanana, isFruit: true, speed: 5 },
            { name: "rock", img: imgRock, isFruit: false, speed: 7 },
            { name: "bomb", img: imgBomb, isFruit: false, speed: 8 }
        ];

        function spawnNewItem() {
            const randomTemplate = itemPool[Math.floor(Math.random() * itemPool.length)];
            currentItem = {
                img: randomTemplate.img,
                isFruit: randomTemplate.isFruit,
                speed: randomTemplate.speed + (Math.random() * 3), 
                x: Math.random() * (canvasElement.width - 200) + 100,
                y: -50
            };
        }

        // 🤖 เรียกใช้งานระบบตรวจจับมือเวอร์ชันเสถียร (MediaPipe Hands Classic)
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        hands.onResults((results) => {
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            // 1. วาดกล้อง
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            // 2. วาดพื้นหลังโปร่งแสง 40%
            canvasCtx.save();
            canvasCtx.globalAlpha = 0.4;
            canvasCtx.drawImage(imgBackground, 0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.restore();

            // คำนวณตำแหน่งมือ (ถ้าเจอ)
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                const wrist = landmarks[0]; // ใช้ข้อมือควบคุมตะกร้า
                basketX = (1 - wrist.x) * canvasElement.width;
            }

            // คำนวณฟิสิกส์เกม
            if (isPlaying && currentItem) {
                currentItem.y += currentItem.speed;

                // ตรวจสอบการชน (เก็บของ)
                if (currentItem.y >= basketY - 40 && currentItem.y <= basketY + 40) {
                    if (Math.abs(currentItem.x - basketX) < basketWidth / 2) {
                        if (currentItem.isFruit) {
                            score += 1;
                        } else {
                            score = Math.max(0, score - 1);
                        }
                        scoreTxt.innerText = "คะแนน: " + score;
                        spawnNewItem();
                    }
                }

                if (currentItem.y > canvasElement.height) {
                    spawnNewItem();
                }
            }

            // วาดองค์ประกอบเกม
            drawGameScene();
        });

        // เปิดกล้องและรันระบบ
        const camera = new Camera(video, {
            onFrame: async () => {
                await hands.send({ image: video });
            },
            width: 1280,
            height: 720
        });

        camera.start().then(() => {
            loadingTxt.style.display = "none";
            startBtn.style.display = "block";
            
            canvasElement.width = video.videoWidth || 1280;
            canvasElement.height = video.videoHeight || 720;
            basketY = canvasElement.height - 120;
            basketX = canvasElement.width / 2;
            spawnNewItem();
        }).catch(err => {
            loadingTxt.innerText = "ไม่สามารถเข้าถึงกล้องได้ กรุณารีเฟรชหน้าเว็บและกดยอมรับสิทธิ์กล้อง";
            console.error(err);
        });

        startBtn.addEventListener("click", () => {
            statusTxt.style.display = "none";
            startBtn.style.display = "none";
            startGame();
        });

        function startGame() {
            isPlaying = true;
            timeLeft = 60;
            score = 0;
            scoreTxt.innerText = "คะแนน: " + score;
            timerTxt.innerText = "เวลา: " + timeLeft;
            
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                timerTxt.innerText = "เวลา: " + timeLeft;
                if (timeLeft <= 0) endGame();
            }, 1000);
        }

        function endGame() {
            isPlaying = false;
            clearInterval(timerInterval);
            statusTxt.style.display = "block";
            startBtn.style.display = "block";
            startBtn.innerText = "เล่นอีกครั้ง";
            statusTxt.innerText = `จบเกม! คุณได้คะแนนทั้งหมด ${score} คะแนน 🌟`;
        }

        function drawGameScene() {
            canvasCtx.save();
            if (isPlaying && currentItem) {
                canvasCtx.drawImage(currentItem.img, currentItem.x - (itemSize / 2), currentItem.y - (itemSize / 2), itemSize, itemSize);
            }
            canvasCtx.drawImage(imgBasket, basketX - (basketWidth / 2), basketY - (basketHeight / 2), basketWidth, basketHeight);
            canvasCtx.restore();
        }
    </script>
</body>
</html>
