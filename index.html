<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web AR - Fruit Catcher Game</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #webcam {
            display: none;
        }

        #canvas-output {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* ส่องกระจก */
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
            z-index: 10;
        }

        #header-info {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .score-box {
            font-size: 32px;
            font-weight: bold;
            color: #333;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 25px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        #timer {
            color: #ff3333;
        }

        #game-status {
            font-size: 32px;
            color: #fff;
            background: rgba(0, 0, 0, 0.85);
            padding: 20px 40px;
            border-radius: 15px;
            text-align: center;
            display: none;
            line-height: 1.6;
        }

        .btn {
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            pointer-events: auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            transition: 0.2s;
            margin-bottom: 50px;
        }

        .btn:hover {
            background-color: #45a049;
            transform: scale(1.05);
        }

        #loading-text {
            color: white;
            font-size: 24px;
            position: absolute;
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="loading-text">กำลังตั้งค่าระบบ AR และเปิดกล้อง...</div>
        
        <video id="webcam" autoplay playsinline></video>
        <canvas id="canvas-output"></canvas>

        <div id="ui-layer">
            <div id="header-info">
                <div id="timer" class="score-box">เวลา: 60</div>
                <div id="score" class="score-box">คะแนน: 0</div>
            </div>
            
            <div id="game-status">หมดเวลา!</div>
            <button id="start-btn" class="btn" style="display: none;">เริ่มเกมเก็บผลไม้</button>
        </div>
    </div>

    <script>
        const video = document.getElementById("webcam");
        const canvasElement = document.getElementById("canvas-output");
        const canvasCtx = canvasElement.getContext("2d");
        const startBtn = document.getElementById("start-btn");
        const timerTxt = document.getElementById("timer");
        const scoreTxt = document.getElementById("score");
        const statusTxt = document.getElementById("game-status");
        const loadingTxt = document.getElementById("loading-text");

        let isPlaying = false;
        let timeLeft = 60; 
        let score = 0;
        let timerInterval;

        let basketX = 0;
        let basketY = 0;
        const basketWidth = 160;
        const basketHeight = 70;

        let currentItem = null; 
        const itemSize = 50; // ขนาดรัศมีของไอเทมทรงกลม

        // ดึงรูปพื้นหลังธรรมชาติแบบเบลอป้องกันบั๊ก CORS
        const imgBackground = new Image();
        imgBackground.crossOrigin = "anonymous";
        imgBackground.src = 'https://images.unsplash.com/photo-1500382017468-9049fed747ef?fm=jpg&q=60&w=1000';

        // บล็อกสระไอเทมในเกม
        const itemPool = [
            { type: "apple", color: "#ff3333", isFruit: true, speed: 6 },
            { type: "banana", color: "#ffcc00", isFruit: true, speed: 5 },
            { type: "rock", color: "#888888", isFruit: false, speed: 7 },
            { type: "bomb", color: "#333333", isFruit: false, speed: 8 }
        ];

        function spawnNewItem() {
            const randomTemplate = itemPool[Math.floor(Math.random() * itemPool.length)];
            currentItem = {
                type: randomTemplate.type,
                color: randomTemplate.color,
                isFruit: randomTemplate.isFruit,
                speed: randomTemplate.speed + (Math.random() * 3), 
                x: Math.random() * (canvasElement.width - 200) + 100,
                y: -50
            };
        }

        // 🤖 เรียกใช้งานระบบตรวจจับมือ MediaPipe
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        hands.onResults((results) => {
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            // 1. วาดกล้อง
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            // 2. วาดพื้นหลังโปร่งแสง 40%
            try {
                canvasCtx.save();
                canvasCtx.globalAlpha = 0.4;
                canvasCtx.drawImage(imgBackground, 0, 0, canvasElement.width, canvasElement.height);
                canvasCtx.restore();
            } catch(e) { /* บายพาสถ้าเกิดเออเรอร์พื้นหลัง */ }

            // คำนวณตำแหน่งมือควบคุมข้อมือ
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                const wrist = landmarks[0];
                basketX = (1 - wrist.x) * canvasElement.width;
            }

            // คำนวณเกมและระบบฟิสิกส์
            if (isPlaying && currentItem) {
                currentItem.y += currentItem.speed;

                // ตรวจสอบการชน (เก็บของใส่ตะกร้า)
                if (currentItem.y >= basketY - 30 && currentItem.y <= basketY + 30) {
                    if (Math.abs(currentItem.x - basketX) < basketWidth / 2) {
                        if (currentItem.isFruit) {
                            score += 1;
                        } else {
                            score = Math.max(0, score - 1);
                        }
                        scoreTxt.innerText = "คะแนน: " + score;
                        spawnNewItem();
                    }
                }

                if (currentItem.y > canvasElement.height) {
                    spawnNewItem();
                }
            }

            // วาดองค์ประกอบเกมด้วยรูปทรงกราฟิกแทนรูปภาพ
            drawGameScene();
        });

        const camera = new Camera(video, {
            onFrame: async () => {
                await hands.send({ image: video });
            },
            width: 1280,
            height: 720
        });

        camera.start().then(() => {
            loadingTxt.style.display = "none";
            startBtn.style.display = "block";
            
            canvasElement.width = video.videoWidth || 1280;
            canvasElement.height = video.videoHeight || 720;
            basketY = canvasElement.height - 120;
            basketX = canvasElement.width / 2;
            spawnNewItem();
        });

        startBtn.addEventListener("click", () => {
            statusTxt.style.display = "none";
            startBtn.style.display = "none";
            startGame();
        });

        function startGame() {
            isPlaying = true;
            timeLeft = 60;
            score = 0;
            scoreTxt.innerText = "คะแนน: " + score;
            timerTxt.innerText = "เวลา: " + timeLeft;
            
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                timerTxt.innerText = "เวลา: " + timeLeft;
                if (timeLeft <= 0) endGame();
            }, 1000);
        }

        function endGame() {
            isPlaying = false;
            clearInterval(timerInterval);
            statusTxt.style.display = "block";
            startBtn.style.display = "block";
            startBtn.innerText = "เล่นอีกครั้ง";
            statusTxt.innerText = `จบเกม! คุณได้คะแนนทั้งหมด ${score} คะแนน 🌟`;
        }

        // ฟังก์ชันวาดรูปทรงตะกร้าและผลไม้ด้วย Code กราฟิกโดยตรง
        function drawGameScene() {
            canvasCtx.save();

            // 1. วาดของที่ตกลงมา
            if (isPlaying && currentItem) {
                canvasCtx.beginPath();
                canvasCtx.arc(currentItem.x, currentItem.y, itemSize / 2, 0, 2 * Math.PI);
                canvasCtx.fillStyle = currentItem.color;
                canvasCtx.fill();
                canvasCtx.lineWidth = 3;
                canvasCtx.strokeStyle = "#ffffff";
                canvasCtx.stroke();
                
                // วาดรายละเอียดของขั้วผลไม้หรือชนวนระเบิดให้ดูรู้เรื่อง
                canvasCtx.beginPath();
                canvasCtx.moveTo(currentItem.x, currentItem.y - (itemSize/2));
                canvasCtx.lineTo(currentItem.x + 5, currentItem.y - (itemSize/2) - 10);
                canvasCtx.strokeStyle = "#553311";
                canvasCtx.lineWidth = 4;
                canvasCtx.stroke();
            }

            // 2. วาดตะกร้าเก็บของ (ครึ่งวงกลมหงายสีน้ำตาลไม้)
            canvasCtx.beginPath();
            canvasCtx.arc(basketX, basketY, basketWidth / 2, 0, Math.PI, false);
            canvasCtx.lineTo(basketX - basketWidth/2, basketY);
            canvasCtx.fillStyle = "#8B5A2B"; // สีน้ำตาลไม้ตะกร้า
            canvasCtx.fill();
            canvasCtx.lineWidth = 5;
            canvasCtx.strokeStyle = "#5c3a1a";
            canvasCtx.stroke();

            // วาดขอบบนตะกร้า
            canvasCtx.beginPath();
            canvasCtx.ellipse(basketX, basketY, basketWidth / 2, 10, 0, 0, 2 * Math.PI);
            canvasCtx.fillStyle = "#A0522D";
            canvasCtx.fill();
            canvasCtx.stroke();

            canvasCtx.restore();
        }
    </script>
</body>
</html>
