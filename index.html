<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web AR - Fruit Catcher Game</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #webcam {
            display: none;
        }

        #canvas-output {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* ส่องกระจก */
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
            z-index: 10;
        }

        #header-info {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .score-box {
            font-size: 32px;
            font-weight: bold;
            color: #333;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 25px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        #timer {
            color: #ff3333;
        }

        #game-status {
            font-size: 32px;
            color: #fff;
            background: rgba(0, 0, 0, 0.85);
            padding: 20px 40px;
            border-radius: 15px;
            text-align: center;
            display: none;
            line-height: 1.6;
        }

        .btn {
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            pointer-events: auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            transition: 0.2s;
            margin-bottom: 50px;
        }

        .btn:hover {
            background-color: #45a049;
            transform: scale(1.05);
        }

        #loading-text {
            color: white;
            font-size: 24px;
            position: absolute;
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="loading-text">กำลังโหลดรูปภาพและตั้งค่าระบบกล้อง AR...</div>
        
        <video id="webcam" autoplay playsinline></video>
        <canvas id="canvas-output"></canvas>

        <div id="ui-layer">
            <div id="header-info">
                <div id="timer" class="score-box">เวลา: 60</div>
                <div id="score" class="score-box">คะแนน: 0</div>
            </div>
            
            <div id="game-status">หมดเวลา!</div>
            <button id="start-btn" class="btn" style="display: none;">เริ่มเกมเก็บผลไม้</button>
        </div>
    </div>

    <script>
        const video = document.getElementById("webcam");
        const canvasElement = document.getElementById("canvas-output");
        const canvasCtx = canvasElement.getContext("2d");
        const startBtn = document.getElementById("start-btn");
        const timerTxt = document.getElementById("timer");
        const scoreTxt = document.getElementById("score");
        const statusTxt = document.getElementById("game-status");
        const loadingTxt = document.getElementById("loading-text");

        let isPlaying = false;
        let timeLeft = 60; 
        let score = 0;
        let timerInterval;

        let basketX = 0;
        let targetBasketX = 0; 
        let basketY = 0;
        const basketWidth = 170;
        const basketHeight = 110;

        let currentItem = null; 
        const itemSize = 80; 

        // 🖼️ โหลดภาพพื้นหลังธรรมชาติ
        const imgBackground = new Image();
        imgBackground.crossOrigin = "anonymous";
        imgBackground.src = 'https://images.unsplash.com/photo-1500382017468-9049fed747ef?fm=jpg&q=60&w=1000';

        // 🔄 ใช้บริการ CORS Proxy ครอบลิงก์เพื่อป้องกันเบราว์เซอร์บล็อกภาพหาย
        const proxy = "https://images.weserv.nl/?url=";

        // โหลดรูปภาพที่คุณระบุผ่านมาทางระบบ Proxy
        const imgRock = new Image(); imgRock.crossOrigin = "anonymous";
        imgRock.src = proxy + encodeURIComponent("https://png.pngtree.com/png-vector/20240801/ourlarge/pngtree-mountain-boulder-rock-png-image_13320663.png");

        const imgBomb = new Image(); imgBomb.crossOrigin = "anonymous";
        imgBomb.src = proxy + encodeURIComponent("https://e7.pngegg.com/pngimages/983/331/png-clipart-bomb-bomb-cartoon-bomb-explosion-cartoon-thumbnail.png");

        const imgApple = new Image(); imgApple.crossOrigin = "anonymous";
        imgApple.src = proxy + encodeURIComponent("https://png.pngtree.com/element_our/20190529/ourmid/pngtree-cartoon-red-apple-illustration-image_1213812.jpg");

        const imgBanana = new Image(); imgBanana.crossOrigin = "anonymous";
        imgBanana.src = proxy + encodeURIComponent("https://img.pikbest.com/png-images/20250207/realistic-banana-png-on-white-background_11505027.png!w700wp");

        const imgBasket = new Image(); imgBasket.crossOrigin = "anonymous";
        imgBasket.src = proxy + encodeURIComponent("https://img.pikbest.com/png-images/20240930/high-quality-blank-fruits-basket-png-perfect-for-graphic-designs_10912028.png!sw800");

        // คลังสิ่งของตก (ความเร็วสูง ตกไวสะใจแบบที่คุณชอบ)
        const itemPool = [
            { type: "apple", img: imgApple, points: 1, baseSpeed: 11 },
            { type: "banana", img: imgBanana, points: 1, baseSpeed: 10.5 },
            { type: "rock", img: imgRock, points: -1, baseSpeed: 13 },
            { type: "bomb", img: imgBomb, points: -3, baseSpeed: 14 }
        ];

        function spawnNewItem() {
            const randomTemplate = itemPool[Math.floor(Math.random() * itemPool.length)];
            currentItem = {
                type: randomTemplate.type,
                img: randomTemplate.img,
                points: randomTemplate.points,
                speed: randomTemplate.baseSpeed + (Math.random() * 4), 
                x: Math.random() * (canvasElement.width - 200) + 100,
                y: -50
            };
        }

        // 🤖 เรียกใช้งานระบบตรวจจับมือ MediaPipe
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.4,
            minTrackingConfidence: 0.4
        });

        hands.onResults((results) => {
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            // 1. วาดกล้อง
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            // 2. วาดพื้นหลังโปร่งแสง 40%
            try {
                canvasCtx.save();
                canvasCtx.globalAlpha = 0.4;
                canvasCtx.drawImage(imgBackground, 0, 0, canvasElement.width, canvasElement.height);
                canvasCtx.restore();
            } catch(e) {}

            // ดักจับและควบคุมมือ (ทิศทางซ้าย-ขวาขยับตามมือตรงเป๊ะ)
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                const wrist = landmarks[0]; 
                targetBasketX = wrist.x * canvasElement.width;
            }

            // ตะกร้าวิ่งตามมืออย่างรวดเร็ว (Speed X ไวขึ้น)
            basketX += (targetBasketX - basketX) * 0.45; 

            // คำนวณระบบฟิสิกส์เกม
            if (isPlaying && currentItem) {
                currentItem.y += currentItem.speed;

                // ตรวจสอบการชน (เก็บของใส่ตะกร้า)
                if (currentItem.y >= basketY - 45 && currentItem.y <= basketY + 45) {
                    if (Math.abs(currentItem.x - basketX) < basketWidth / 2) {
                        score += currentItem.points;
                        score = Math.max(0, score); 
                        scoreTxt.innerText = "คะแนน: " + score;
                        spawnNewItem();
                    }
                }

                if (currentItem.y > canvasElement.height) {
                    spawnNewItem();
                }
            }

            // วาดสิ่งของที่ได้จากลิงก์
            drawGameScene();
        });

        const camera = new Camera(video, {
            onFrame: async () => {
                await hands.send({ image: video });
            },
            width: 1280,
            height: 720
        });

        // ตรวจสอบว่ารูปหลักๆ โหลดเสร็จเพื่อเริ่มเกม
        let loadedImages = 0;
        function checkImages() {
            loadedImages++;
            if (loadedImages >= 4) {
                camera.start().then(() => {
                    loadingTxt.style.display = "none";
                    startBtn.style.display = "block";
                    
                    canvasElement.width = video.videoWidth || 1280;
                    canvasElement.height = video.videoHeight || 720;
                    basketY = canvasElement.height - 120;
                    basketX = canvasElement.width / 2;
                    targetBasketX = canvasElement.width /
