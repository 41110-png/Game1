<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web AR - Fruit Catcher Game</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #webcam {
            display: none;
        }

        #canvas-output {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* ส่องกระจก */
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
            z-index: 10;
        }

        #header-info {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .score-box {
            font-size: 32px;
            font-weight: bold;
            color: #333;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 25px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        #timer {
            color: #ff3333;
        }

        #game-status {
            font-size: 32px;
            color: #fff;
            background: rgba(0, 0, 0, 0.85);
            padding: 20px 40px;
            border-radius: 15px;
            text-align: center;
            display: none;
            line-height: 1.6;
        }

        .btn {
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            pointer-events: auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            transition: 0.2s;
            margin-bottom: 50px;
        }

        .btn:hover {
            background-color: #45a049;
            transform: scale(1.05);
        }

        #loading-text {
            color: white;
            font-size: 24px;
            position: absolute;
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="loading-text">กำลังตั้งค่าระบบ AR และเปิดกล้อง...</div>
        
        <video id="webcam" autoplay playsinline></video>
        <canvas id="canvas-output"></canvas>

        <div id="ui-layer">
            <div id="header-info">
                <div id="timer" class="score-box">เวลา: 60</div>
                <div id="score" class="score-box">คะแนน: 0</div>
            </div>
            
            <div id="game-status">หมดเวลา!</div>
            <button id="start-btn" class="btn" style="display: none;">เริ่มเกมเก็บผลไม้</button>
        </div>
    </div>

    <script>
        const video = document.getElementById("webcam");
        const canvasElement = document.getElementById("canvas-output");
        const canvasCtx = canvasElement.getContext("2d");
        const startBtn = document.getElementById("start-btn");
        const timerTxt = document.getElementById("timer");
        const scoreTxt = document.getElementById("score");
        const statusTxt = document.getElementById("game-status");
        const loadingTxt = document.getElementById("loading-text");

        let isPlaying = false;
        let timeLeft = 60; 
        let score = 0;
        let timerInterval;

        let basketX = 0;
        let targetBasketX = 0; 
        let basketY = 0;
        const basketWidth = 160;
        const basketHeight = 70;

        let currentItem = null; 
        const itemSize = 55; 

        // รูปพื้นหลังธรรมชาติ
        const imgBackground = new Image();
        imgBackground.crossOrigin = "anonymous";
        imgBackground.src = 'https://images.unsplash.com/photo-1500382017468-9049fed747ef?fm=jpg&q=60&w=1000';

        // 🍎 คลังของตก (ปรับ Speed เพิ่มขึ้น 2 เท่าจากเดิม ตกไวและท้าทายขึ้นมาก!)
        const itemPool = [
            { type: "apple", points: 1, baseSpeed: 11 },
            { type: "banana", points: 1, baseSpeed: 10 },
            { type: "orange", points: 1, baseSpeed: 10.5 },
            { type: "rock", points: -1, baseSpeed: 13 },
            { type: "bomb", points: -3, baseSpeed: 14 }
        ];

        function spawnNewItem() {
            const randomTemplate = itemPool[Math.floor(Math.random() * itemPool.length)];
            currentItem = {
                type: randomTemplate.type,
                points: randomTemplate.points,
                speed: randomTemplate.baseSpeed + (Math.random() * 4), // เพิ่มความสุ่มความเร็วให้เร้าใจ
                x: Math.random() * (canvasElement.width - 200) + 100,
                y: -50
            };
        }

        // 🤖 เรียกใช้งานระบบตรวจจับมือ MediaPipe
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.4,
            minTrackingConfidence: 0.4
        });

        hands.onResults((results) => {
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            // 1. วาดกล้อง
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            // 2. วาดพื้นหลังโปร่งแสง 40%
            try {
                canvasCtx.save();
                canvasCtx.globalAlpha = 0.4;
                canvasCtx.drawImage(imgBackground, 0, 0, canvasElement.width, canvasElement.height);
                canvasCtx.restore();
            } catch(e) {}

            // ดักจับข้อมือ ทิศทางตรงกับมือขยับจริง
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                const wrist = landmarks[0]; 
                targetBasketX = wrist.x * canvasElement.width;
            }

            // ตะกร้าขยับตามไวขึ้น
            basketX += (targetBasketX - basketX) * 0.45; 

            // คำนวณเกมและระบบฟิสิกส์
            if (isPlaying && currentItem) {
                currentItem.y += currentItem.speed;

                // ตรวจสอบการชน (เก็บของใส่ตะกร้า)
                if (currentItem.y >= basketY - 35 && currentItem.y <= basketY + 35) {
                    if (Math.abs(currentItem.x - basketX) < basketWidth / 2) {
                        score += currentItem.points;
                        score = Math.max(0, score); 
                        scoreTxt.innerText = "คะแนน: " + score;
                        spawnNewItem();
                    }
                }

                if (currentItem.y > canvasElement.height) {
                    spawnNewItem();
                }
            }

            // วาดองค์ประกอบเกม
            drawGameScene();
        });

        const camera = new Camera(video, {
            onFrame: async () => {
                await hands.send({ image: video });
            },
            width: 1280,
            height: 720
        });

        camera.start().then(() => {
            loadingTxt.style.display = "none";
            startBtn.style.display = "block";
            
            canvasElement.width = video.videoWidth || 1280;
            canvasElement.height = video.videoHeight || 720;
            basketY = canvasElement.height - 120;
            basketX = canvasElement.width / 2;
            targetBasketX = canvasElement.width / 2;
            spawnNewItem();
        });

        startBtn.addEventListener("click", () => {
            statusTxt.style.display = "none";
            startBtn.style.display = "none";
            startGame();
        });

        function startGame() {
            isPlaying = true;
            timeLeft = 60;
            score = 0;
            scoreTxt.innerText = "คะแนน: " + score;
            timerTxt.innerText = "เวลา: " + timeLeft;
            
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                timerTxt.innerText = "เวลา: " + timeLeft;
                if (timeLeft <= 0) endGame();
            }, 1000);
        }

        function endGame() {
            isPlaying = false;
            clearInterval(timerInterval);
            statusTxt.style.display = "block";
            startBtn.style.display = "block";
            startBtn.innerText = "เล่นอีกครั้ง";
            statusTxt.innerText = `จบเกม! คุณได้คะแนนทั้งหมด ${score} คะแนน 🌟`;
        }

        // 🖌️ ฟังก์ชันวาดรูปทรงผลไม้และไอเทมแบบแยกประเภทชัดเจน (Custom Vector Shape)
        function drawItemShape(ctx, x, y, type) {
            ctx.save();
            ctx.translate(x, y);

            if (type === "apple") {
                // วาดผลแอปเปิ้ล (ทรงกลมคู่ซ้ายขวา)
                ctx.beginPath();
                ctx.arc(-10, 0, 18, 0, Math.PI * 2);
                ctx.arc(10, 0, 18, 0, Math.PI * 2);
                ctx.fillStyle = "#e63946";
                ctx.fill();
                // ส่วนล่างหยักก้นแอปเปิ้ล
                ctx.beginPath();
                ctx.arc(0, 12, 10, 0, Math.PI);
                ctx.fillStyle = "#e63946";
                ctx.fill();
                // ก้าน
                ctx.beginPath();
                ctx.quadraticCurveTo(0, -15, 5, -25);
                ctx.strokeStyle = "#4a2c11";
                ctx.lineWidth = 3;
                ctx.stroke();
                // ใบไม้
                ctx.beginPath();
                ctx.ellipse(6, -23, 8, 4, Math.PI / 4, 0, Math.PI * 2);
                ctx.fillStyle = "#4ad66d";
                ctx.fill();

            } else if (type === "banana") {
                // วาดกล้วยเสี้ยวพระจันทร์โค้ง
                ctx.beginPath();
                ctx.arc(0, -5, 22, 0.2 * Math.PI, 0.9 * Math.PI, false);
                ctx.quadraticCurveTo(0, 28, -20, 5);
                ctx.fillStyle = "#ffde4d";
                ctx.fill();
                // ขั้วกล้วยสีเขียวเข้ม/น้ำตาล
                ctx.beginPath();
                ctx.rect(15, 5, 5, 6);
                ctx.fillStyle = "#5c6b1a";
                ctx.fill();

            } else if (type === "orange") {
                // วาดผลส้มทรงกลมสมบูรณ์
                ctx.beginPath();
                ctx.arc(0, 0, 20, 0, Math.PI * 2);
                ctx.fillStyle = "#f77f00";
                ctx.fill();
                // จุดผิวส้มเล็กๆ
                ctx.fillStyle = "#d66800";
                ctx.fillRect(-6, -6, 2, 2);
                ctx.fillRect(6, 4, 2, 2);
                ctx.fillRect(-4, 6, 2, 2);
                // ใบไม้ส้ม
                ctx.beginPath();
                ctx.ellipse(0, -20, 10, 5, -Math.PI / 6, 0, Math.PI * 2);
                ctx.fillStyle = "#2a9d8f";
                ctx.fill();

            } else if (type === "rock") {
                // วาดก้อนหินเหลี่ยมเหลี่ยมสี่เหลี่ยมคางหมู
                ctx.beginPath();
                ctx.moveTo(-18, 15);
                ctx.lineTo(-12, -15);
                ctx.lineTo(12, -12);
                ctx.lineTo(20, 12);
                ctx.lineTo(0, 18);
                ctx.closePath();
                ctx.fillStyle = "#7f8c8d";
                ctx.fill();
                // เส้นแรเงาเพิ่มความเหลี่ยม
                ctx.beginPath();
                ctx.moveTo(-12, -15);
                ctx.lineTo(0, 2);
                ctx.lineTo(20, 12);
                ctx.strokeStyle = "#95a5a6";
                ctx.lineWidth = 2;
                ctx.stroke();

            } else if (type === "bomb") {
                // วาดลูกระเบิดสีดำสนิท
                ctx.beginPath();
                ctx.arc(0, 4, 18, 0, Math.PI * 2);
                ctx.fillStyle = "#212529";
                ctx.fill();
                // ชนวนเหล็กขั้วบน
                ctx.fillStyle = "#6c757d";
                ctx.fillRect(-5, -18, 10, 5);
                // ชนวนเชือกสีขาวโค้ง
                ctx.beginPath();
                ctx.quadraticCurveTo(0, -22, 12, -28);
                ctx.strokeStyle = "#e9ecef";
                ctx.lineWidth = 2;
                ctx.stroke();
                // ประกายไฟสีส้มแดงปลายชนวน
                ctx.beginPath();
                ctx.arc(12, -28, 5, 0, Math.PI * 2);
                ctx.fillStyle = "#ff5722";
                ctx.fill();
                ctx.beginPath();
                ctx.arc(12, -28, 2, 0, Math.PI * 2);
                ctx.fillStyle = "#ffeb3b";
                ctx.fill();
            }

            ctx.restore();
        }

        function drawGameScene() {
            canvasCtx.save();

            // 1. เรียกฟังก์ชันวาดผลไม้ตามชนิด
            if (isPlaying && currentItem) {
                drawItemShape(canvasCtx, currentItem.x, currentItem.y, currentItem.type);
            }

            // 2. วาดตะกร้าเก็บของเหมือนเดิม
            canvasCtx.beginPath();
            canvasCtx.arc(basketX, basketY, basketWidth / 2, 0, Math.PI, false);
            canvasCtx.lineTo(basketX - basketWidth/2, basketY);
            canvasCtx.fillStyle = "#8B5A2B"; 
            canvasCtx.fill();
            canvasCtx.lineWidth = 5;
            canvasCtx.strokeStyle = "#5c3a1a";
            canvasCtx.stroke();

            canvasCtx.beginPath();
            canvasCtx.ellipse(basketX, basketY, basketWidth / 2, 10, 0, 0, 2 * Math.PI);
            canvasCtx.fillStyle = "#A0522D";
            canvasCtx.fill();
            canvasCtx.stroke();

            canvasCtx.restore();
        }
    </script>
</body>
</html>
